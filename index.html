<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
}

/* HEADER */
.hero{
  max-width:520px;
  margin:25px auto;
  padding:25px;
  background:#1c2541;
  border-radius:14px;
  text-align:center;
  position:relative;
}

.beta{
  position:absolute;
  top:10px;
  right:10px;
  background:gold;
  color:black;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  background:gold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

/* RAINBOW TITLE */
.hero h1{
  font-size:26px;
  background:linear-gradient(to right,red,orange,yellow,green,blue,indigo,violet);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTONS */
button{
  background:gold;
  color:black;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

/* FORMS */
input{
  width:80%;
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

/* DASHBOARD */
#dashboard{
  display:none;
  max-width:520px;
  margin:auto;
}

.card{
  background:#1c2541;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">
  <div class="beta">BETA</div>

  <div class="logo">MXM</div>

  <h1>MXM Crypto Empire</h1>

  <!-- SIGNUP -->
  <h3>Register</h3>
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>

  <!-- LOGIN -->
  <h3>Login</h3>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card">
<h3>Free Earning Platform</h3>
<button onclick="trackClick('forfans')">Open</button>
</div>

<div class="card">
<h3>FixedFloat Exchange</h3>
<button onclick="trackClick('fixedfloat')">Open</button>
</div>

<button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>

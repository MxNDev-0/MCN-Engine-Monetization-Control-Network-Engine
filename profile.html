<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .monitor {
      background: #000;
      font-size: 13px;
      height: 120px;
      overflow-y: auto;
      font-family: monospace;
      padding: 10px;
      border-radius: 12px;
      margin: 10px;
      color: #00ff9c;
    }

    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    /* 🔥 DIGITAL SCREEN STYLE */
    .online-screen {
      background: #000;
      border-radius: 10px;
      padding: 8px;
      font-family: monospace;
      max-height: 250px;
      overflow-y: auto;
      box-shadow: inset 0 0 10px rgba(0,255,150,0.2);
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .user-row:last-child {
      border-bottom: none;
    }

    .user-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      box-shadow: 0 0 6px #00ff88;
    }

    .name {
      font-size: 13px;
      color: #00ffcc;
    }

    .user-actions {
      display: flex;
      gap: 6px;
    }

    .user-actions button {
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-add {
      background: #5bc0be;
    }

    .btn-msg {
      background: #3a86ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">Back</button>
  <h3>Profile</h3>
</div>

<div id="monitor" class="monitor">
  [SYSTEM] Profile monitor started...
</div>

<div class="card">
  <div style="margin-bottom:8px; color:#5bc0be;">
    ● ONLINE USERS
  </div>

  <div id="onlineUsers" class="online-screen"></div>
</div>

<script type="module" src="profile.js"></script>

</body>
</html>

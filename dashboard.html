<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

  <!-- HAMBURGER -->
  <button onclick="toggleMenu()">☰</button>

  <h3 style="margin:0;">MXM Dashboard</h3>

  <button onclick="logout()">Logout</button>

</div>

<!-- HAMBURGER MENU -->
<div id="menu" style="display:none; background:#1c2541; padding:10px;">
  <p id="userEmail"></p>
  <button onclick="setUsername()">Set Username</button>
  <button onclick="location.href='faq.html'">FAQ</button>
  <button onclick="changePassword()">Change Password</button>
</div>

<div class="container">

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="post-box" style="display:none;">
    <h3>👑 Admin Monitor</h3>
    <p>Total Users: <span id="totalUsers">0</span></p>
    <p>Total Posts: <span id="totalPosts">0</span></p>
  </div>

  <!-- GENERAL CHAT -->
  <div class="post-box">
    <h4 style="margin-top:0;">General Chat</h4>

    <div id="chatBox" class="chat-box"></div>

    <div style="display:flex; gap:5px;">
      <input id="chatInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- POSTS -->
  <div id="posts"></div>

</div>

<div class="footer">
⚠️ Educational platform only. No financial guarantees.
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>

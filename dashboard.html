<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* 🔔 NOTIFICATION */
    .notif-wrapper {
      position: relative;
      cursor: pointer;
      font-size: 16px;
      padding: 5px;
    }

    .notif-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 10px;
      display: none;
    }

    .notif-panel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 280px;
      max-height: 350px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    /* HEADER */
    .navbar {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #1c2541;
    }

    .nav-left button {
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 18px;
      border-radius: 8px;
    }

    .nav-title {
      flex: 1;
      text-align: center;
      margin: 0;
      font-size: 18px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-right button {
      padding: 6px 10px;
      font-size: 13px;
    }

    /* ✅ ADS FIX (REAL SLIDER) */
    .ads-container {
      overflow: hidden;
      position: relative;
    }

    .ads-slider {
      display: flex;
      transition: transform 0.5s ease;
    }

    .ad {
      min-width: 100%;
      text-align: center;
      padding: 15px;
      background: #0b132b;
      border-radius: 8px;
      font-size: 13px;
    }

    /* ✅ CHAT FIX */
    .row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .row input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: white; /* back to white */
      color: black;
    }

    .row button {
      padding: 10px 14px;
      border-radius: 6px;
      background: #5bc0be;
      border: none;
      cursor: pointer;
    }

    /* Chat action buttons */
    #chatBox button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <h3 class="nav-title">MCN Engine</h3>

  <div class="nav-right">
    <div class="notif-wrapper" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="notif-badge"></span>
    </div>

    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="notifPanel" class="notif-panel"></div>

<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goMessages()">💬 Messages</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="donate()">💰 Donate</button>
  <button onclick="openDeveloper()">💻 Dev</button>
  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<div class="container">

  <!-- ✅ ADS -->
  <div class="card">
    <h4>🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">
        <div class="ad">🚀 Promote your project here</div>
        <div class="ad">💰 Buy ad space on MCN Engine</div>
        <div class="ad">📢 Your ad here</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <div class="card">
    <h4>💬 Community Chat</h4>

    <div id="chatBox"></div>

    <div class="row">
      <input id="chatInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
}

/* HEADER */
.hero{
  max-width:520px;
  margin:25px auto;
  padding:25px;
  background:#1c2541;
  border-radius:14px;
  text-align:center;
  position:relative;
}

.beta{
  position:absolute;
  top:10px;
  right:10px;
  background:gold;
  color:black;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}

/* LOGO */
.logo{
  width:70px;
  height:70px;
  margin:auto;
  background:gold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  font-size:18px;
}

/* TITLE */
.hero h1{
  font-size:26px;
  margin:10px 0;
  background:linear-gradient(to right,red,orange,yellow,green,blue,indigo,violet);
  -webkit-background-clip:text;
  color:transparent;
}

/* FORMS */
input{
  width:85%;
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
  outline:none;
}

/* BUTTONS */
button{
  background:gold;
  color:black;
  padding:10px 15px;
  margin:6px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* DASHBOARD */
#dashboard{
  display:none;
  max-width:520px;
  margin:20px auto;
}

.card{
  background:#1c2541;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.logout{
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">

  <div class="beta">BETA</div>

  <div class="logo">MXM</div>

  <h1>MXM Crypto Empire</h1>

  <p>Welcome — Register or Login to continue</p>

  <!-- SIGNUP -->
  <h3>Sign Up</h3>
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button id="signupBtn">Create Account</button>

  <!-- LOGIN -->
  <h3>Login</h3>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>

</div>

<!-- DASHBOARD (HIDDEN UNTIL LOGIN) -->
<div id="dashboard">

  <div class="card">
    <h3>Free Earning Platform</h3>
    <button onclick="window.open('https://forfans.me/chichiguy','_blank')">
      Open
    </button>
  </div>

  <div class="card">
    <h3>FixedFloat Exchange</h3>
    <button onclick="window.open('https://ff.io/?ref=s1nep47a','_blank')">
      Open
    </button>
  </div>

  <div class="card">
    <h3>Portfolio / Proof</h3>
    <p>Coming soon (admin uploads screenshots)</p>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- FIREBASE APP -->
<script type="module" src="app.js"></script>

</body>
</html>

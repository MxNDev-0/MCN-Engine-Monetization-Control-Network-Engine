<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

  <button onclick="toggleMenu()">☰</button>

  <h3>MXM Dashboard</h3>

  <button onclick="logout()">Logout</button>

</div>

<!-- HAMBURGER MENU -->
<div id="menu" style="display:none; background:#1c2541; padding:10px;">

  <p id="userEmail"></p>

  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goUpgrade()">🚀 Upgrade</button>
  <button onclick="goSupport()">💰 Support</button>
  <button onclick="goFAQ()">❓ FAQ</button>
  <button onclick="openSupport()">📩 Contact Support</button>

  <button onclick="openMySection()">🔒 My Section</button>

  <button onclick="setUsername()">Set Username</button>
  <button onclick="changePassword()">Change Password</button>

</div>

<div class="container">

  <!-- ONLINE USERS (GLOBAL MONITOR) -->
  <div class="post-box">
    <h3>🟢 Online Users</h3>
    <div id="onlineUsers"></div>
  </div>

  <!-- GENERAL CHAT -->
  <div class="post-box">
    <h3>General Chat</h3>

    <div id="chatBox" class="chat-box"></div>

    <div style="display:flex; gap:5px;">
      <input id="chatInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>

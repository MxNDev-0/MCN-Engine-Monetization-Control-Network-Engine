<!DOCTYPE html>
<html>
<head>
  <title>MXM Live Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <h2>Live Chat 💬</h2>
  <button onclick="location.href='dashboard.html'">Back</button>
</div>

<div id="chatBox" style="
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  background:#1c2541;
  margin: 10px;
  border-radius: 10px;
"></div>

<div class="chat-input" style="display:flex; padding:10px;">
  <input id="msg" placeholder="Type message..." style="flex:1; padding:10px;">
  <button onclick="sendMsg()" style="margin-left:10px;">Send</button>
</div>

<script type="module" src="chat.js"></script>
</body>
</html>

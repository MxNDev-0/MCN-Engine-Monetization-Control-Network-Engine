<!DOCTYPE html>
<html>
<head>
  <title>Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b132b; color:#fff; }

    .navbar {
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      background:#1c2541;
      padding:12px;
    }

    .back-btn {
      position:absolute;
      left:10px;
    }

    .menu-btn {
      position:absolute;
      right:10px;
    }

    .chat-box {
      height: calc(100vh - 140px);
      overflow-y:auto;
      padding:10px;
    }

    .msg { padding:8px; margin:5px 0; border-radius:8px; }
    .me { background:#5bc0be; color:#000; margin-left:auto; }
    .them { background:#1c2541; }

    .input {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:10px;
      background:#1c2541;
    }

    input { flex:1; padding:10px; }
  </style>
</head>

<body>

<div class="navbar">
  <button class="back-btn" onclick="goBack()">←</button>
  <h3>Messages</h3>
  <button class="menu-btn" onclick="toggleMenu()">⋮</button>
</div>

<div id="menu" style="display:none; padding:10px;">
  <button onclick="deleteChat()">Delete Chat</button>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input">
  <input id="msgInput">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module" src="messages.js"></script>

<script>
function goBack(){ location.href="dashboard.html"; }
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>

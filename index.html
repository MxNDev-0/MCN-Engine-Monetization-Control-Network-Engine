<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#0b132b;
  color:white;
  text-align:center;
  padding:20px;
}

/* HERO */
.hero {
  max-width:520px;
  margin:auto;
  padding:25px;
  background:#1c2541;
  border-radius:14px;
  position:relative;
}

/* BETA LEFT */
.beta {
  position:absolute;
  left:10px;
  top:10px;
  background:#00c853;
  color:black;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

/* LOGO */
.logo {
  width:70px;
  height:70px;
  margin:auto;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

/* TITLE */
.hero h1 {
  margin-top:10px;
  font-size:26px;
  background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
  -webkit-background-clip: text;
  color: transparent;
}

/* BUTTONS */
button {
  padding:12px;
  margin:8px;
  border-radius:6px;
  border:none;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard { display:none; }

/* CARDS */
.card {
  background:#1c2541;
  padding:18px;
  margin:15px auto;
  border-radius:12px;
  max-width:520px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#1c2541;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  margin:10% auto;
}

/* INPUT */
input, textarea {
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:red;
  padding:15px;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <span class="beta">BETA</span>

  <div class="logo">MXM</div>

  <h1>MXM Crypto Empire</h1>

  <button onclick="openRegister()">Register</button>
  <button onclick="openLogin()">Login</button>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
<div class="modal-content">
<h3>Create Account</h3>
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<input id="regConfirm" type="password" placeholder="Confirm Password">

<button onclick="register()">Register</button>
<button onclick="closeModal('registerModal')">Close</button>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="resetPassword()">Forgot Password</button>
<button onclick="resendVerification()">Resend Verification</button>
<button onclick="closeModal('loginModal')">Close</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>

<div class="card">
<h3>💰 Free Earning Platform</h3>
<button onclick="openLink('earn')">Start</button>
</div>

<div class="card">
<h3>💱 FixedFloat Exchange</h3>
<button onclick="openLink('float')">Open</button>
</div>

<div class="card">
<h3>📸 Proof Images</h3>
<input type="file" id="imgUpload">
<button onclick="uploadImage()">Upload</button>
<div id="gallery"></div>
</div>

<div class="card">
<h3>📩 Contact Admin</h3>
<textarea id="message"></textarea><br>
<button onclick="sendMessage()">Send</button>
</div>

<div class="card">
<h3>🔒 Premium</h3>
<button onclick="premium()">Open</button>
</div>

<button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<div id="popup" class="popup"></div>

<script type="module" src="app.js"></script>

</body>
</html>

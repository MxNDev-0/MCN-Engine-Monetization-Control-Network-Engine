<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    .container {
      padding: 15px;
      position: relative;
    }

    .menu-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .dropdown {
      position: absolute;
      top: 45px;
      right: 10px;
      background: #1c2541;
      border-radius: 10px;
      padding: 10px;
      display: none;
      width: 200px;
    }

    .dropdown input {
      margin-bottom: 6px;
    }

    .dropdown button {
      width: 100%;
      margin-top: 5px;
    }

    .username-box {
      text-align: center;
      margin-bottom: 15px;
      font-size: 16px;
      color: #5bc0be;
    }

    /* 3 DOT MENU */
    .dots {
      position: absolute;
      right: 10px;
      top: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    .post {
      position: relative;
      background: #1c2541;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .post-menu {
      position: absolute;
      right: 10px;
      top: 30px;
      background: #0b132b;
      border: 1px solid #5bc0be;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      z-index: 10;
    }

    .post-menu button {
      background: none;
      border: none;
      color: #fff;
      padding: 8px;
      text-align: left;
      width: 120px;
    }

    .post-menu button:hover {
      background: #1c2541;
    }

  </style>
</head>

<body>

<div class="navbar">
  <h3 style="margin:auto;">Profile 👤</h3>
  <button onclick="location.href='dashboard.html'">⬅</button>
</div>

<div class="container">

  <!-- MENU -->
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div id="dropdownMenu" class="dropdown">
    <input id="usernameInput" placeholder="New username">
    <button onclick="updateUsername()">Save Username</button>
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- USERNAME -->
  <div class="username-box">
    Username: <span id="usernameDisplay">Loading...</span>
  </div>

  <!-- POST -->
  <div class="card">
    <h4>Create Post</h4>
    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()">Post</button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>

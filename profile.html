<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <h3 style="margin:auto;">Profile 👤</h3>
</div>

<div class="container">

  <div class="card">
    <h4>Create Post</h4>

    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="width:auto;">Post</button>
    </div>
  </div>

  <div class="card">
    <h4>My Field</h4>
    <div id="myPosts"></div>
  </div>

</div>

<!-- FLOAT BACK BUTTON -->
<button class="back-float" onclick="history.back()">←</button>

<script type="module" src="profile.js"></script>
</body>
</html>

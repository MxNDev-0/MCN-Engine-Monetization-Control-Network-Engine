<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    .container {
      padding: 15px;
      position: relative;
    }

    .menu-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .dropdown {
      position: absolute;
      top: 45px;
      right: 10px;
      background: #1c2541;
      border-radius: 10px;
      padding: 10px;
      display: none;
      width: 200px;
    }

    .dropdown input {
      margin-bottom: 6px;
    }

    .dropdown button {
      width: 100%;
      margin-top: 5px;
    }

    .username-box {
      text-align: center;
      margin-bottom: 15px;
      font-size: 16px;
      color: #5bc0be;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h3 style="margin:auto;">Profile 👤</h3>
</div>

<div class="container">

  <!-- ☰ MENU BUTTON -->
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <!-- DROPDOWN MENU -->
  <div id="dropdownMenu" class="dropdown">
    <input id="usernameInput" placeholder="New username">
    <button onclick="updateUsername()">Save Username</button>

    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- USERNAME DISPLAY -->
  <div class="username-box">
    Username: <span id="usernameDisplay">Loading...</span>
  </div>

  <button class="small-nav-btn" onclick="location.href='dashboard.html'">
    ⬅ Back
  </button>

  <div class="card">
    <h4>Create Post</h4>
    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="width:auto;">Post</button>
    </div>
  </div>

  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>

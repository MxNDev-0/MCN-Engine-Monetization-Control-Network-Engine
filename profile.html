<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    .container {
      padding: 15px;
      position: relative;
    }

    .small-nav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #5bc0be;
      border: none;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h3 style="margin:auto;">Profile 👤</h3>
</div>

<div class="container">

  <button class="small-nav-btn" onclick="location.href='dashboard.html'">
    ⬅ Back
  </button>

  <div class="card">
    <h4>Create Post</h4>
    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="width:auto;">Post</button>
    </div>
  </div>

  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>

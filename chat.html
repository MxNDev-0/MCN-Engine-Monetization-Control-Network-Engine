<!DOCTYPE html>
<html>
<head>
  <title>MXM Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">MXM Chat 💬</h2>

  <div class="nav-links">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- CHAT BOX -->
  <div id="chatBox" style="height:400px; overflow-y:auto; background:#1c2541; padding:10px; border-radius:10px;">
  </div>

  <!-- INPUT -->
  <div style="margin-top:10px;">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module" src="chat.js"></script>
</body>
</html>

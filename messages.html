<!DOCTYPE html>
<html>
<head>
  <title>Messages — MCN Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #1c2541;
    }

    .chat-box {
      height: 60vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
    }

    .me {
      background: #5bc0be;
      color: black;
      margin-left: auto;
    }

    .them {
      background: #1c2541;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1c2541;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #5bc0be;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="goBack()">← Back</button>
  <h3>Messages</h3>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-box">
  <input id="msgInput" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module" src="messages.js"></script>

<script>
function goBack(){
  location.href = "dashboard.html";
}
</script>

</body>
</html>

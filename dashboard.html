<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    .notif-wrapper {
      position: relative;
      cursor: pointer;
      font-size: 16px;
      padding: 5px;
    }

    .notif-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 10px;
      display: none;
    }

    .notif-panel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 280px;
      max-height: 350px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    .navbar {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #1c2541;
    }

    .nav-left button {
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 18px;
      border-radius: 8px;
    }

    .nav-title {
      flex: 1;
      text-align: center;
      margin: 0;
      font-size: 18px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-right button {
      padding: 6px 10px;
      font-size: 13px;
    }

    .ads-container {
      overflow: hidden;
      position: relative;
    }

    .ads-slider {
      display: flex;
      transition: transform 0.5s ease;
    }

    .ad {
      min-width: 100%;
      text-align: center;
      padding: 15px;
      background: #0b132b;
      border-radius: 8px;
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .row input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: white;
      color: black;
    }

    .row button {
      padding: 10px 14px;
      border-radius: 6px;
      background: #5bc0be;
      border: none;
      cursor: pointer;
    }

    #discoverBox {
      margin-top: 10px;
    }

    .card {
      background: #1c2541;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .card-title {
      color: #5bc0be;
      font-weight: bold;
    }

    .card-text {
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <h3 class="nav-title">MCN Engine</h3>

  <div class="nav-right">
    <div class="notif-wrapper" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="notif-badge"></span>
    </div>

    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="notifPanel" class="notif-panel"></div>

<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goMessages()">💬 Messages</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="donate()">💰 Donate</button>
  <button onclick="openDeveloper()">💻 Dev</button>
  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<div class="container">

  <div class="card">
    <h4>🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">
        <div class="ad">🚀 Promote your project here</div>
        <div class="ad">💰 Buy ad space on MCN Engine</div>
        <div class="ad">📢 Your ad here</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <!-- 📰 REPLACED CHAT WITH DISCOVER -->
  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading feed...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
async function loadDiscover() {
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post => {
      box.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">

          ${post.image ? `<img src="${post.image}">` : ""}

          <div class="card-content">
            <div class="card-title">${post.title}</div>
            <div class="card-text">
              ${(post.content || "").substring(0, 120)}...
            </div>
          </div>

        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "Failed to load feed";
  }
}

function openPost(id) {
  location.href = "post.html?id=" + id;
}

loadDiscover();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
    }

    /* 🔔 NOTIFICATION BADGE */
    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: red;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 50%;
    }

    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      flex-direction: column;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    #chatBox {
      max-height: 250px;
      overflow-y: auto;
      background: #0b132b;
      padding: 10px;
      border-radius: 8px;
    }

    .row {
      display: flex;
      gap: 5px;
    }

    .row input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1c2541;
      color: white;
    }

    .row button {
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      padding: 8px;
    }

    .earn-card {
      text-align: center;
    }

    .earn-card button {
      display: inline-block;
    }

    .price-box {
      font-size: 13px;
      line-height: 1.6;
    }

    /* 🔔 NOTIFICATION PANEL */
    #notifPanel {
      display: none;
      position: fixed;
      top: 60px;
      right: 10px;
      width: 280px;
      max-height: 300px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      padding: 10px;
      z-index: 999;
    }

    .notif-item {
      background: #0b132b;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="toggleMenu()">☰</button>

  <h3>MCN Engine</h3>

  <!-- 🔥 RIGHT SIDE UPGRADE -->
  <div class="nav-right">

    <!-- 🔔 NOTIFICATION BUTTON -->
    <button class="icon-btn" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="badge" style="display:none;">0</span>
    </button>

    <button onclick="logout()">Logout</button>

  </div>
</div>

<!-- 🔔 NOTIFICATION PANEL -->
<div id="notifPanel"></div>

<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>

  <button onclick="goMessages()">💬 Messages</button>

  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>

  <button onclick="support()">💰 Support</button>
  <button onclick="openDeveloper()">💻 Dev</button>

  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<div class="container">

  <div class="card">
    <h4>🟢 Live Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <div class="card">
    <h4>📊 Live Prices</h4>
    <div class="price-box" id="priceBox">Loading prices...</div>
  </div>

  <div class="card">
    <h4>💬 Community Chat</h4>

    <div id="chatBox"></div>
    <div id="typingBox"></div>

    <div class="row">
      <input id="chatInput">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="card earn-card">
    <h4>💰 Earn</h4>
    <button onclick="location.href='earn/index.html'">Open</button>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
/* 🔔 SIMPLE TOGGLE (UI ONLY — SAFE) */
function toggleNotif() {
  const panel = document.getElementById("notifPanel");
  panel.style.display =
    panel.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>

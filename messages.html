<!DOCTYPE html>
<html>
<head>
  <title>MCN DM System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .box {
      padding: 10px;
    }

    .chat {
      height: 70vh;
      overflow-y: auto;
      background: #1c2541;
      padding: 10px;
      border-radius: 10px;
    }

    .msg {
      margin: 6px 0;
      padding: 8px;
      background: #0b132b;
      border-radius: 8px;
    }

    .input {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #5bc0be;
      border: none;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="box">

  <h3>💬 Messages</h3>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="msgInput" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script type="module" src="messages.js"></script>

</body>
</html>

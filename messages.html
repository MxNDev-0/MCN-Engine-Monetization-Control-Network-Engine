<!DOCTYPE html>
<html>
<head>
  <title>Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0b132b; color:#fff; }

    .navbar {
      padding:10px;
      background:#1c2541;
      text-align:center;
    }

    .inbox {
      padding:10px;
      max-height:150px;
      overflow-y:auto;
    }

    .item {
      padding:10px;
      background:#1c2541;
      margin-bottom:6px;
      border-radius:8px;
      cursor:pointer;
    }

    .chat-box {
      height: calc(100vh - 140px);
      overflow-y:auto;
      padding:10px;
    }

    .msg {
      margin:5px 0;
      padding:8px;
      border-radius:8px;
      max-width:70%;
    }

    .me {
      background:#5bc0be;
      color:#000;
      margin-left:auto;
    }

    .them {
      background:#1c2541;
    }

    .input {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:10px;
      background:#1c2541;
      gap:5px;
    }

    input {
      flex:1;
      padding:10px;
    }

    button {
      padding:10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="goBack()">← Back</button>
  <h3>Messages</h3>
</div>

<div id="inboxList" class="inbox"></div>

<div id="chatBox" class="chat-box"></div>

<div class="input">
  <input id="msgInput" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module" src="messages.js"></script>

<script>
function goBack(){ location.href="dashboard.html"; }
</script>

</body>
</html>

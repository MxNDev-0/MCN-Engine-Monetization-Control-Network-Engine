<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine - Earn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div style="text-align:center; padding:20px;">

  <h1>💰 MCN Engine Earnings Hub</h1>

  <p style="max-width:500px; margin:auto; line-height:1.6;">
    Learn how to earn money using simple online platforms. This section guides you step-by-step into understanding how online earning systems work, how creators monetize content, and how beginners can get started without technical skills.
  </p>

  <!-- PREMIUM LOCK BUTTON -->
  <button onclick="checkPremium()">
    🚀 Go to ForFans Guide
  </button>

</div>

<script type="module">
import { auth, db } from "../firebase.js";

import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let currentUser = null;

/* ================= AUTH ================= */
onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

/* ================= PREMIUM + ADMIN CHECK ================= */
window.checkPremium = async () => {

  if (!currentUser) {
    alert("Please login first");
    location.href = "../index.html";
    return;
  }

  const ref = doc(db, "users", currentUser.uid);
  const snap = await getDoc(ref);

  let isPremium = false;
  let isAdmin = false;

  if (snap.exists()) {
    const data = snap.data();
    isPremium = data.premium === true;
    isAdmin = data.role === "admin"; // ✅ NEW
  }

  // ✅ ADMIN BYPASS (MAIN FIX)
  if (isAdmin || isPremium) {
    location.href = "forfans.html";
    return;
  }

  // ❌ NORMAL USERS (LOCKED)
  const confirmUpgrade = confirm(
    "⚠️ This feature is for PREMIUM users only.\n\n" +
    "Upgrade now to unlock earning tools.\n\n" +
    "Payments are NON-REFUNDABLE and results are NOT guaranteed."
  );

  if (confirmUpgrade) {
    location.href = "../dashboard.html";
  }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Chat Pro</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .chat-box { height: 70vh; overflow-y: auto; padding: 10px; }
    .msg { padding: 8px; margin: 6px 0; border-radius: 8px; max-width: 75%; }
    .me { background: #5bc0be; margin-left: auto; color: #000; }
    .them { background: #1c2541; }
    .chat-input { display:flex; gap:6px; padding:10px; }
    .chat-input input { flex:1; padding:10px; }
    .users-list { max-height:120px; overflow-y:auto; border-bottom:1px solid #333; }
    .user-item { padding:8px; cursor:pointer; border-bottom:1px solid #222; }
  </style>
</head>

<body>

<div class="navbar">
  <h2 class="logo">MCN Engine Chat Pro 💬</h2>

  <div class="nav-links">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <div class="users-list" id="usersList"></div>

  <div id="chatHeader">Select a user</div>

  <div id="chatBox" class="chat-box"></div>

  <div class="chat-input">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module" src="chat.js"></script>

<script>
function goBack(){ location.href="dashboard.html"; }
function logout(){ location.href="index.html"; }
</script>

</body>
</html>

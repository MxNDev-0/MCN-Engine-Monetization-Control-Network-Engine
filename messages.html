<!DOCTYPE html>
<html>
<head>
  <title>Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b132b;
      color:white;
    }

    .container {
      padding:10px;
    }

    .chat-list {
      background:#1c2541;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }

    .chat-item {
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      cursor:pointer;
    }

    .chat-box {
      background:#1c2541;
      border-radius:10px;
      padding:10px;
      height:300px;
      overflow-y:auto;
    }

    .input-row {
      display:flex;
      gap:5px;
      margin-top:10px;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
      background:#0b132b;
      color:white;
    }

    button {
      padding:10px;
      background:#5bc0be;
      border:none;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div class="container">

  <h3>💬 Messages</h3>

  <div class="chat-list" id="chatList"></div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-row">
    <input id="msgInput" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script type="module" src="messages.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .profile-header {
      display: flex;
      align-items: center;
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5bc0be;
    }

    .username {
      margin-left: 10px;
      color: #5bc0be;
      font-weight: bold;
    }

    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    #postInput {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #0b132b;
      color: white;
      box-sizing: border-box;
    }

    .post {
      background: #0b132b;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      position: relative;
    }

    .menu-box {
      display: none;
      position: absolute;
      right: 10px;
      top: 30px;
      background: #1c2541;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
    }

    .menu-box button {
      width: 100%;
      padding: 8px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 10%;
      right: 10%;
      background: #1c2541;
      padding: 12px;
      border-radius: 12px;
    }

    .icon-row {
      display: flex;
      gap: 10px;
      margin: 10px;
    }

    .icon-box {
      background: #1c2541;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* 🔥 NEW: SMALL PROFILE MONITOR */
    .mini-monitor {
      background: #000;
      color: #00ff88;
      font-family: monospace;
      font-size: 12px;
      height: 120px;
      overflow-y: auto;
      padding: 8px;
      border-radius: 10px;
      margin: 10px;
      border: 1px solid #5bc0be;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">Back</button>
  <h3>Profile</h3>
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- MENU -->
<div id="dropdownMenu" style="display:none;padding:10px;">
  <input id="usernameInput" placeholder="New username">
  <button onclick="updateUsername()">Save Username</button>
  <button onclick="resetPassword()">Reset Password</button>
</div>

<!-- PROFILE HEADER -->
<div class="profile-header">
  <div class="avatar"></div>
  <div class="username" id="usernameDisplay">Loading...</div>
</div>

<!-- FRIEND ICONS -->
<div class="icon-row">
  <div class="icon-box" onclick="openRequests()">👥 Requests</div>
  <div class="icon-box" onclick="openFriends()">👤 Friends</div>
</div>

<!-- 🔥 MINI LIVE MONITOR (NEW) -->
<div class="mini-monitor" id="profileMonitor">
  [SYSTEM] Profile monitor initialized...
</div>

<!-- POPUPS -->
<div id="requestsPopup" class="popup">
  <h4>Friend Requests</h4>
  <div id="friendRequestsBox"></div>
  <button onclick="closePopup('requestsPopup')">Close</button>
</div>

<div id="friendsPopup" class="popup">
  <h4>Friends</h4>
  <div id="friendsBox"></div>
  <button onclick="closePopup('friendsPopup')">Close</button>
</div>

<!-- CREATE POST REMOVED (as requested) -->

<script type="module" src="profile.js"></script>

<script>
function openRequests(){
  document.getElementById("requestsPopup").style.display = "block";
}

function openFriends(){
  document.getElementById("friendsPopup").style.display = "block";
}

function closePopup(id){
  document.getElementById(id).style.display = "none";
}
</script>

</body>
</html>
